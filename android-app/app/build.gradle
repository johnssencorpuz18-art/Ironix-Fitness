plugins {
    id "com.android.application"
}

android {
    namespace "com.ironix.fitness"
    compileSdk 36

    defaultConfig {
        applicationId "com.ironix.fitness"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0"
        buildConfigField "String", "IRONIX_URL", "\"http://10.0.2.2/ironix/\""
    }

    buildFeatures {
        buildConfig true
    }
